<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macros Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<style>
:root{
--bg:#f4f6f8; --card:#ffffff; --text:#111; --accent:#4CAF50; --danger:#ff5252;
}
.dark{
--bg:#1e1e1e; --card:#2a2a2a; --text:#f1f1f1; --accent:#76ff03; --danger:#ff5252;
}
body{font-family:Arial;background:var(--bg);color:var(--text);margin:0;padding:10px;overflow-x:hidden;}
.card{background:var(--card);padding:12px;margin-bottom:12px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
button{padding:12px;border:none;border-radius:8px;cursor:pointer;margin-top:6px;width:100%;font-size:16px;background:var(--accent);color:white;}
.small-btn{background:var(--danger);padding:6px 10px;font-size:12px;}
input,select{padding:10px;margin:6px 0;width:100%;font-size:16px;}
.progress{background:#ddd;height:12px;border-radius:10px;margin-top:6px;}
.progress-bar{height:12px;border-radius:10px;background:var(--accent);}
canvas{width:100%;max-width:100%;height:200px;margin-top:12px;}
.swipe-container{display:flex;transition:transform 0.3s ease;}
.swipe-page{min-width:100%;flex-shrink:0;}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
#saveStatus{font-size:12px;color:green;margin-top:4px;}
</style>
</head>
<body>

<div class="top">
<h2>Physique Tracker</h2>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="card">
<button onclick="setMode('cut')">Fat Loss</button>
<button onclick="setMode('bulk')">Lean Bulk</button>
<div id="modeDisplay"></div>
<button class="small-btn" onclick="resetData()">Reset All Data</button>
<div id="saveStatus">Saved ✔</div>
</div>

<div class="card">
<h3>Add Entry</h3>
<select id="day"></select>
<select id="meal">
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
<option>Snack</option>
</select>
<input type="text" id="food" placeholder="Food name">
<input type="number" id="protein" placeholder="Protein (g)">
<input type="number" id="carbs" placeholder="Carbs (g)">
<input type="number" id="fat" placeholder="Fat (g)">
<label><input type="checkbox" id="training"> Training Day</label>
<button onclick="addFood()">Add Entry</button>
</div>

<div id="swipeContainer" class="swipe-container"></div>

<!-- Firebase & Chart.js SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
// ======= Firebase Setup =======
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDJGXnnOlBvIEu0IsiE7oHOu996i8IKxu0",
    authDomain: "mycalorietracker-97682.firebaseapp.com",
    projectId: "mycalorietracker-97682",
    storageBucket: "mycalorietracker-97682.firebasestorage.app",
    messagingSenderId: "954441838067",
    appId: "1:954441838067:web:4e6db21488fb2b43f13686",
    measurementId: "G-V9MMH5P6X6"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = firebase.firestore();

// ======= Device ID =======
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = "user-" + Math.random().toString(36).substring(2,12);
  localStorage.setItem("deviceId", deviceId);
}

// ======= Core Variables =======
const PROTEIN_TARGET = 140;
const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let mode = localStorage.getItem("mode") || "cut";
let currentWeekKey;
let data = dayNames.map(()=>({entries:[],training:false}));

function getWeekKey(){
  const now = new Date();
  const firstDayOfYear = new Date(now.getFullYear(),0,1);
  const pastDays = Math.floor((now - firstDayOfYear)/86400000);
  const weekNumber = Math.ceil((pastDays + firstDayOfYear.getDay()+1)/7);
  return now.getFullYear() + "-W" + weekNumber;
}
currentWeekKey = getWeekKey();

// ======= Load Data from Firebase =======
db.collection("users").doc(deviceId).get()
.then(doc=>{
  if(doc.exists && doc.data().data){ data = doc.data().data; }
  populateDays();
  renderSwipePages();
})
.catch(e=>console.error("Firebase load error:", e));

// ======= Save Function =======
function save(){
  db.collection("users").doc(deviceId).set({
    data: data,
    week: currentWeekKey,
    updated: new Date()
  })
  .then(()=>{
    const status = document.getElementById("saveStatus");
    if(status){ status.textContent="Saved ✔"; setTimeout(()=>status.textContent="",2000);}
  })
  .catch(e=> console.error("Firebase save error:", e));
}

// ======= Reset Function =======
function resetData(){
  if(!confirm("Are you sure you want to delete all your data?")) return;
  db.collection("users").doc(deviceId).delete()
  .then(()=>{
    data = dayNames.map(()=>({entries:[],training:false}));
    renderSwipePages();
    alert("All data has been reset.");
  })
  .catch(e=> console.error("Reset error:", e));
}

// ======= Populate Days Dropdown =======
function populateDays(){
  let select=document.getElementById("day"); select.innerHTML="";
  dayNames.forEach((d,i)=> select.innerHTML+=`<option value="${i}">${d}</option>`);
}

// ======= Add Food Entry =======
function addFood(){
  let day=document.getElementById("day").value;
  let meal=document.getElementById("meal").value;
  let food=document.getElementById("food").value;
  let p=+document.getElementById("protein").value||0;
  let c=+document.getElementById("carbs").value||0;
  let f=+document.getElementById("fat").value||0;
  let training=document.getElementById("training").checked;
  if(!food) return alert("Enter food name");
  let cal = p*4 + c*4 + f*9;
  data[day].training = training;
  data[day].entries.push({meal,food,p,c,f,cal});
  save();
  renderSwipePages();
  document.querySelectorAll("input").forEach(i=>{if(i.type!=="checkbox") i.value="";});
}

// ======= Render Pages & Charts =======
function renderSwipePages(){
  const container = document.getElementById("swipeContainer");
  container.innerHTML = "";
  data.forEach((dayData,i)=>{
    const page = document.createElement("div");
    page.className="swipe-page card";
    let dayTotal=0, proteinTotal=0;
    dayData.entries.forEach(e=>{ dayTotal+=e.cal; proteinTotal+=e.p; });
    let target = mode==="cut"? (dayData.training?1800:1433) : (dayData.training?2100:1700);
    let entriesHTML = dayData.entries.map(e=>`<div>${e.meal} ${e.food} ${Math.round(e.cal)} kcal</div>`).join("");
    page.innerHTML = `<strong>${dayNames[i]} ${dayData.training?"💪":""}</strong> ${Math.round(dayTotal)}/${target} kcal<br>Protein: ${Math.round(proteinTotal)}/${PROTEIN_TARGET} g<br>${entriesHTML}<br><canvas id="calChart_${i}"></canvas><canvas id="protChart_${i}"></canvas>`;
    container.appendChild(page);
    renderChartsForDay(i, dayData);
  });
  document.getElementById("modeDisplay").textContent = "Mode: " + mode;
}

function renderChartsForDay(i, dayData){
  let calData=[], protData=[], labels=[];
  dayData.entries.forEach(e=>{ calData.push(e.cal); protData.push(e.p); labels.push(e.meal); });
  new Chart(document.getElementById("calChart_"+i).getContext("2d"),{
    type:'bar',
    data:{labels,datasets:[{label:'Calories',data:calData,backgroundColor:calData.map(v=>v>2100?'var(--danger)':'var(--accent)')}]}});
  new Chart(document.getElementById("protChart_"+i).getContext("2d"),{
    type:'bar',
    data:{labels,datasets:[{label:'Protein',data:protData,backgroundColor:protData.map(v=>v<PROTEIN_TARGET?'var(--danger)':'var(--accent)')}]}});
}

// ======= Mode & Dark Toggle =======
function setMode(m){ mode=m; localStorage.setItem("mode",m); renderSwipePages(); }
function toggleDark(){ document.body.classList.toggle("dark"); }

// ======= PWA: Service Worker =======
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js")
  .then(()=>console.log("Service Worker registered"))
  .catch(e=>console.error("SW registration failed:", e));
}
</script>
</body>
</html>
