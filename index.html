<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physique Tracker</title>
<style>
:root{
  --bg:#121212;
  --card:#1E1E1E;
  --text:#E0E0E0;
  --accent:#00FF7F;
  --accent-light:#33FF99;
  --danger:#FF4C4C;
  --shadow:0 4px 12px rgba(0,0,0,0.5);
}
body{
  font-family:'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  padding:16px;
}
h2,h3{margin:8px 0;}
button{
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}
button:hover{opacity:0.85;}
input,select{
  border-radius:8px; border:1px solid #333; padding:8px;
  font-size:14px; width:100%; margin-top:6px; background:#222; color:#E0E0E0;
}
.card{
  background:var(--card);
  padding:16px;
  margin-bottom:16px;
  border-radius:16px;
  box-shadow:var(--shadow);
}
.primary-btn{
  background:var(--accent);
  color:#121212;
  padding:10px;
  font-weight:600;
  margin-top:8px;
}
.danger-btn{
  background:var(--danger);
  color:#fff;
  padding:6px 8px;
  font-size:12px;
  margin-left:6px;
}
.entry-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid #333;
}
.entry-row span{flex:1;}
.entry-buttons{display:flex; gap:6px;}
.progress-container{
  background:#333;
  border-radius:12px;
  height:20px;
  overflow:hidden;
  margin:12px 0;
}
.progress-bar{
  height:100%;
  background:var(--accent);
  width:0%;
  transition:0.3s;
  text-align:center;
  color:#121212;
  font-weight:bold;
  line-height:20px;
}
.remaining{
  margin-top:4px;
  font-size:14px;
  color:var(--text);
}
</style>
</head>
<body>

<div class="card">
  <h2>Physique Tracker</h2>
</div>

<div class="card">
  <h3>Weekly Calories Progress</h3>
  <div class="progress-container">
    <div id="weeklyProgress" class="progress-bar"></div>
  </div>
  <div id="weeklyRemaining" class="remaining"></div>
</div>

<div class="card">
  <h3>Add Entry</h3>
  <select id="day"></select>
  <select id="meal">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
    <option>Snack</option>
  </select>
  <input type="text" id="food" placeholder="Food name">
  <input type="number" id="protein" placeholder="Protein (g)">
  <input type="number" id="carbs" placeholder="Carbs (g)">
  <input type="number" id="fat" placeholder="Fat (g)">
  <label><input type="checkbox" id="training"> Training Day</label>
  <button id="addEntryBtn" class="primary-btn">Add Entry</button>
</div>

<div id="weekContainer"></div>

<script>
const PROTEIN_TARGET = 140;
const WEEKLY_CAL_TARGET = 11500; // <-- your weekly goal
const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let data = JSON.parse(localStorage.getItem("physiqueData")) || dayNames.map(()=>({entries:[],training:false}));

// Populate day dropdown
function populateDays(){
  const daySelect = document.getElementById("day");
  daySelect.innerHTML = "";
  dayNames.forEach((d,i)=>{ daySelect.innerHTML += `<option value="${i}">${d}</option>`; });
}
populateDays();

// Save to localStorage
function save(){
  localStorage.setItem("physiqueData", JSON.stringify(data));
  updateWeeklyProgress();
}

// Add Entry
function addFood(){
  const day = +document.getElementById("day").value;
  const meal = document.getElementById("meal").value;
  const food = document.getElementById("food").value;
  const p = +document.getElementById("protein").value||0;
  const c = +document.getElementById("carbs").value||0;
  const f = +document.getElementById("fat").value||0;
  const training = document.getElementById("training").checked;
  if(!food) return alert("Enter food name");
  const cal = p*4 + c*4 + f*9;
  data[day].entries.push({meal,food,p,c,f,cal});
  data[day].training = training;
  save();
  renderWeek();
  document.getElementById("food").value="";
  document.getElementById("protein").value="";
  document.getElementById("carbs").value="";
  document.getElementById("fat").value="";
  document.getElementById("training").checked=false;
}
document.getElementById("addEntryBtn").addEventListener("click", addFood);

// Edit / Delete Entry
function editEntry(d,i){
  const e = data[d].entries[i];
  document.getElementById("day").value = d;
  document.getElementById("meal").value = e.meal;
  document.getElementById("food").value = e.food;
  document.getElementById("protein").value = e.p;
  document.getElementById("carbs").value = e.c;
  document.getElementById("fat").value = e.f;
  document.getElementById("training").checked = data[d].training;
  const btn = document.getElementById("addEntryBtn");
  btn.textContent = "Save Changes";
  const saveEdit = function(){
    const meal = document.getElementById("meal").value;
    const food = document.getElementById("food").value;
    const p = +document.getElementById("protein").value||0;
    const c = +document.getElementById("carbs").value||0;
    const f = +document.getElementById("fat").value||0;
    const training = document.getElementById("training").checked;
    if(!food) return alert("Enter food name");
    const cal = p*4 + c*4 + f*9;
    data[d].entries[i] = {meal,food,p,c,f,cal};
    data[d].training = training;
    save();
    renderWeek();
    btn.textContent = "Add Entry";
    btn.removeEventListener('click', saveEdit);
    btn.addEventListener('click', addFood);
  };
  btn.removeEventListener('click', addFood);
  btn.addEventListener('click', saveEdit);
}

function deleteEntry(d,i){
  if(!confirm("Delete this entry?")) return;
  data[d].entries.splice(i,1);
  save();
  renderWeek();
}

// Render Week vertically
function renderWeek(){
  const container = document.getElementById("weekContainer");
  container.innerHTML = "";
  data.forEach((dayData,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    let totalC = 0, totalP = 0;
    dayData.entries.forEach(e=>{ totalC+=e.cal; totalP+=e.p; });
    let html = dayData.entries.map((e,j)=>`
      <div class="entry-row">
        <span>${e.meal} ${e.food} ${Math.round(e.cal)} kcal</span>
        <div class="entry-buttons">
          <button class="primary-btn" style="font-size:10px;" onclick="editEntry(${i},${j})">Edit</button>
          <button class="danger-btn" onclick="deleteEntry(${i},${j})">Del</button>
        </div>
      </div>`).join("");
    card.innerHTML = `<strong>${dayNames[i]} ${dayData.training?"💪":""}</strong> ${Math.round(totalC)} kcal<br>Protein: ${Math.round(totalP)}/${PROTEIN_TARGET} g<br>${html}`;
    container.appendChild(card);
  });
  updateWeeklyProgress();
}

// Update weekly calories progress and remaining
function updateWeeklyProgress(){
  let totalWeekCalories = data.reduce((sum,day)=> sum + day.entries.reduce((s,e)=> s+e.cal,0),0);
  const progressEl = document.getElementById("weeklyProgress");
  const remainingEl = document.getElementById("weeklyRemaining");
  const percent = Math.min((totalWeekCalories/WEEKLY_CAL_TARGET)*100,100);
  progressEl.style.width = percent + "%";
  remainingEl.textContent = `Calories Remaining: ${Math.max(WEEKLY_CAL_TARGET - totalWeekCalories,0)} kcal`;
}

renderWeek();
</script>
</body>
</html>
